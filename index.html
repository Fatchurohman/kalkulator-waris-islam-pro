<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kalkulator Waris Islam Pro</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <header>
        <h1>⚖️ Kalkulator Waris Islam Pro</h1>
        <h2>Madzhab Syafi'i</h2>
        <p>
            Perhitungan pembagian warisan berdasarkan kaidah ilmu faraidh.
        </p>
    </header>

    <hr>

    <section class="card">

        <h3>📜 Data Pewaris</h3>

        <label>
            Total Harta Warisan
        </label>

        <input 
            type="number" 
            id="harta" 
            placeholder="Masukkan jumlah harta">


    </section>


    <section class="card">

        <h3>👨‍👩‍👧 Pilihan Ahli Waris</h3>


        <label>
            <input type="checkbox" id="suami">
            Suami
        </label>

        <br>


        <label>
            <input type="checkbox" id="istri">
            Istri
        </label>

        <br>


        <label>
            <input type="checkbox" id="ayah">
            Ayah
        </label>

        <br>


        <label>
            <input type="checkbox" id="ibu">
            Ibu
        </label>

        <br>


        <label>
            <input type="checkbox" id="anakLaki">
            Anak Laki-laki
        </label>

        <br>


        <label>
            <input type="checkbox" id="anakPerempuan">
            Anak Perempuan
        </label>


    </section>


    <button onclick="hitungWaris()">
        ⚖️ Hitung Waris
    </button>


    <section class="card hasil">

        <h3>📊 Hasil Perhitungan</h3>

        <div id="hasil">
            Hasil akan tampil di sini.
        </div>

    </section>


    <footer>

        <p>
        Berdasarkan kaidah ilmu faraidh<br>
        Developed by <strong>Fatur Sky</strong>
        </p>

    </footer>


</div>


<script src="script.js"></script>

</body>
</html>
